<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        input.error {
            border-color: #e74c3c;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #27ae60;
            font-size: 13px;
            margin-top: 6px;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fde8e8;
            color: #c0392b;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .loader.show {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .timer {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 12px;
        }

        .user-info {
            text-align: center;
            padding: 20px;
        }

        .user-info .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .user-info h2 {
            color: #333;
            margin-bottom: 8px;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 OTP Login</h1>
        <p class="subtitle">Login with your phone number</p>

        <div id="alert" class="alert"></div>

        <!-- Step 1: Enter Phone Number -->
        <div id="step1" class="step active">
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter 10-digit mobile number" maxlength="10" autocomplete="tel">
                <div id="phoneError" class="error-message"></div>
            </div>
            <button id="checkPhoneBtn" onclick="checkPhone()">Continue</button>
        </div>

        <!-- Step 2: Enter Email (for new users) -->
        <div id="step2" class="step">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email address" autocomplete="email">
                <div id="emailError" class="error-message"></div>
            </div>
            <button id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
            <span class="back-link" onclick="goToStep(1)">← Back</span>
        </div>

        <!-- Step 3: Enter OTP -->
        <div id="step3" class="step">
            <p style="text-align: center; color: #666; margin-bottom: 16px; font-size: 14px;">
                OTP sent to <strong id="emailDisplay"></strong>
            </p>
            <div class="form-group">
                <label for="otp">Enter OTP</label>
                <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" autocomplete="one-time-code">
                <div id="otpError" class="error-message"></div>
            </div>
            <button id="verifyOtpBtn" onclick="verifyOtp()">Verify OTP</button>
            <p id="timer" class="timer"></p>
            <span class="back-link" onclick="resendOtp()">Resend OTP</span>
            <span class="back-link" onclick="goToStep(1)">Change Phone Number</span>
        </div>

        <!-- Step 4: Success -->
        <div id="step4" class="step">
            <div class="user-info">
                <div class="icon">✅</div>
                <h2>Login Successful!</h2>
                <p>Phone: <strong id="userPhone"></strong></p>
                <p>Email: <strong id="userEmail"></strong></p>
            </div>
            <button onclick="logout()">Logout</button>
        </div>

        <div id="loader" class="loader"></div>
    </div>

    <script>
        let currentPhone = '';
        let currentEmail = '';
        let timerInterval = null;

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        function hideAlert() {
            const alert = document.getElementById('alert');
            alert.classList.remove('show');
        }

        function showLoader() {
            document.getElementById('loader').classList.add('show');
            disableAllButtons();
        }

        function hideLoader() {
            document.getElementById('loader').classList.remove('show');
            enableAllButtons();
        }

        function disableAllButtons() {
            document.querySelectorAll('button').forEach(btn => btn.disabled = true);
        }

        function enableAllButtons() {
            document.querySelectorAll('button').forEach(btn => btn.disabled = false);
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
            const input = element.previousElementSibling;
            if (input && input.tagName === 'INPUT') {
                input.classList.add('error');
            }
        }

        function clearError(elementId) {
            const element = document.getElementById(elementId);
            element.textContent = '';
            element.classList.remove('show');
            const input = element.previousElementSibling;
            if (input && input.tagName === 'INPUT') {
                input.classList.remove('error');
            }
        }

        function clearAllErrors() {
            ['phoneError', 'emailError', 'otpError'].forEach(id => clearError(id));
        }

        function goToStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById(`step${stepNumber}`).classList.add('active');
            hideAlert();
            clearAllErrors();
            
            if (stepNumber === 3) {
                startTimer();
            } else {
                stopTimer();
            }

            // Focus on input of current step
            if (stepNumber === 1) {
                document.getElementById('phone').focus();
            } else if (stepNumber === 2) {
                document.getElementById('email').focus();
            } else if (stepNumber === 3) {
                document.getElementById('otp').focus();
            }
        }

        function startTimer() {
            stopTimer();
            let timeLeft = 300; // 5 minutes
            const timerElement = document.getElementById('timer');
            
            timerInterval = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `OTP expires in: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    stopTimer();
                    timerElement.textContent = 'OTP expired. Please resend.';
                }
                timeLeft--;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('timer').textContent = '';
        }

        async function checkPhone() {
            const phone = document.getElementById('phone').value.trim();
            clearAllErrors();
            hideAlert();

            if (!phone || !/^[6-9]\d{9}$/.test(phone)) {
                showError('phoneError', 'Please enter a valid 10-digit Indian mobile number');
                return;
            }

            showLoader();
            try {
                const response = await fetch('/api/check-phone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });

                const data = await response.json();

                if (response.ok) {
                    currentPhone = phone;
                    if (data.emailRequired) {
                        goToStep(2);
                    } else {
                        currentEmail = null;
                        await sendOtpInternal(phone);
                    }
                } else {
                    showAlert(data.error || 'Something went wrong', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please check your connection.', 'error');
            } finally {
                hideLoader();
            }
        }

        async function sendOtp() {
            const email = document.getElementById('email').value.trim();
            clearAllErrors();
            hideAlert();

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('emailError', 'Please enter a valid email address');
                return;
            }

            currentEmail = email;
            await sendOtpInternal(currentPhone, email);
        }

        async function sendOtpInternal(phone, email = null) {
            showLoader();
            try {
                const body = { phone };
                if (email) body.email = email;

                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('emailDisplay').textContent = data.message.split(' ').pop();
                    goToStep(3);
                    showAlert(data.message, 'success');
                } else {
                    showAlert(data.error || 'Failed to send OTP', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please check your connection.', 'error');
            } finally {
                hideLoader();
            }
        }

        async function verifyOtp() {
            const otp = document.getElementById('otp').value.trim();
            clearAllErrors();
            hideAlert();

            if (!otp || otp.length !== 6) {
                showError('otpError', 'Please enter the 6-digit OTP');
                return;
            }

            showLoader();
            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentPhone, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    stopTimer();
                    document.getElementById('userPhone').textContent = data.user.phone;
                    document.getElementById('userEmail').textContent = data.user.email;
                    goToStep(4);
                } else {
                    showAlert(data.error || 'Invalid OTP', 'error');
                    document.getElementById('otp').value = '';
                    document.getElementById('otp').focus();
                }
            } catch (err) {
                showAlert('Network error. Please check your connection.', 'error');
            } finally {
                hideLoader();
            }
        }

        async function resendOtp() {
            document.getElementById('otp').value = '';
            clearAllErrors();
            hideAlert();
            await sendOtpInternal(currentPhone, currentEmail || undefined);
        }

        function logout() {
            currentPhone = '';
            currentEmail = '';
            document.getElementById('phone').value = '';
            document.getElementById('email').value = '';
            document.getElementById('otp').value = '';
            goToStep(1);
        }

        // Allow Enter key to submit forms
        document.getElementById('phone').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPhone();
        });

        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendOtp();
        });

        document.getElementById('otp').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyOtp();
        });

        // Auto-focus phone input on load
        document.getElementById('phone').focus();
    </script>
</body>
</html>
